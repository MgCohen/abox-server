docType: feature-plan
title: Feature implementation plan

# Catalog: which block types may appear. No counts — the author picks by each
# block's `short` rubric and includes only what carries substance.
blocks: [summary, context, scope, decision, phase, verification, open-question]

# At most we require presence. No min/max, no ordering rules.
required: [summary, phase, verification]

rubric: |
  Distill the dump into blocks; do not transcribe it. Name real files and
  symbols. Pick blocks by their `short` rubric. Write enough prose to be
  understood — summary and context deserve real sentences and rationale, not a
  terse skeleton — but keep any single block tight, not a wall of text. Open
  questions, if any, go last.
