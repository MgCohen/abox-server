docType: feature-plan
title: Feature implementation plan
short: Build or change a feature — objective, scope, ordered phases, verification.

# Catalog: which block types may appear. No counts — pick by each block's `short`.
blocks: [summary, context, scope, decision, phase, verification, open-question]
required: [summary, phase, verification]

# Doc-level attributes (front matter), validated against the leading
# `<!-- key: value -->` comments. Lets simple/single-block docs carry data here.
attrs:
  status: { enum: [draft, approved], default: draft }

# Binary, checkable one-liners (pairs with the judge), not a paragraph.
rubric:
  - Distill the dump; never transcribe it.
  - Name real files and symbols, not invented ones.
  - Include only blocks that carry substance (pick by each block's `short`).
  - Summary and context get real prose; no block is a wall of text.
  - Bold marks labels (**Goal.**), not inline emphasis.
  - Open questions, if any, come last.
