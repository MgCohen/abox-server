type: open-question
collection: true
group: Open Questions
short: A genuinely unresolved decision the reader must make.
usage: |
  Members under the "## Open Questions" group as "### <title>". State the question
  and options; put the recommended default in `lean`. If already decided, it is a
  `decision`. The group goes last.
attrs:
  lean: { type: string, required: false }
body: { type: markdown, required: true }
example: |
  ## Open Questions

  ### GitHub client library
  <!-- id: 9 -->
  lean: Octokit.NET

  Octokit.NET (typed, official) vs raw `HttpClient` vs shelling `gh`. This is
  feature code, so ADR 0012's zero-dependency rule does not apply — flag the new
  dependency for the owner.
