type: decision
collection: true
group: Decisions
short: A settled choice carried in; do not re-litigate.
usage: |
  Members live under the "## Decisions" group as "### <title>". State the
  decision and the one-line why. Closed choices only; genuinely open ones are
  `open-question`. The id lives in the comment.
body: { type: markdown, required: true }
example: |
  ## Decisions

  ### Merge-commit for Level-1
  <!-- id: 6 -->

  Use a merge commit for L1 stacked merges: it keeps the parent an ancestor, so
  descendants only retarget — no rebase. Rebase cascade is reject/rebuild-only.
