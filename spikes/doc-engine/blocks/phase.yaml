type: phase
collection: true
group: Phases
description: One ordered, shippable step of the build.
rubric:
  - Lead with what the step reuses before what it adds.
  - The body states the goal and the done-when bar.
  - Carry `status`; for a blocked phase, list blockers as a sub-list.
  - Use `caveat` for a short qualifier on an otherwise-done phase.
  - At least two phases — a single step is not a plan.
attrs:
  status: { enum: [todo, doing, done, blocked], default: todo }
  caveat: string
body: markdown
