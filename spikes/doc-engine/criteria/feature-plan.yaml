docType: feature-plan

# Criteria for the repo's generic judge (PLANS/generic-judge.md): each is
# { id, description, howToCheck }. The judge is SEMANTIC and soft — it runs
# AFTER validate.py (structure, hard) passes. Two rubrics:
#   selection — did the author pick the right blocks from the catalog?
#   quality   — was the plan authored correctly inside those blocks?

selection:
  - id: sel-coverage
    description: >-
      Every load-bearing element of the dump is represented by a block — nothing
      significant was dropped (objective, current state, scope, settled
      decisions, the ordered build steps, open decisions, how done is proven).
    howToCheck: >-
      Compare the dump's sections against the blocks present; flag any major dump
      content with no home.
  - id: sel-right-type
    description: >-
      Each piece of content sits in the correct block type — settled choices are
      `decision`, genuinely open ones are `open-question`, build steps are
      `phase`, current state is `context`.
    howToCheck: >-
      Look for miscategorised content, e.g. an open choice stated as a decision,
      or a decision parked in open-questions.
  - id: sel-no-filler
    description: >-
      No block is filler; each carries real substance for its type per the
      block's own `description`/`rubric`.
    howToCheck: Flag any block that restates another or says nothing concrete.

quality:
  - id: q-standalone
    description: >-
      The plan stands alone — no references to "the dump", prior chat, or
      revision language ("as discussed", "this version", "previously").
    howToCheck: Search the prose for back-references to context outside the doc.
  - id: q-concrete
    description: >-
      Steps name real files, types, and symbols rather than vague gestures
      ("make it work").
    howToCheck: >-
      Check phases/decisions cite concrete paths or identifiers; flag vague steps.
  - id: q-reuse-first
    description: Each phase leads with what it reuses before what it adds.
    howToCheck: Inspect each phase body for a reuse statement preceding the additions.
  - id: q-decisions-vs-open
    description: >-
      Settled decisions are stated as closed; genuinely open ones live in
      `open-question` with a recommended `lean` default.
    howToCheck: Confirm every open-question has a lean and is actually unresolved.
  - id: q-verification-real
    description: >-
      Verification exercises the real workflow (a behaviour run end-to-end), not
      just build/typecheck.
    howToCheck: Read the verification block for a concrete end-to-end check.
  - id: q-prose-level
    description: >-
      Prose is substantive where it matters (summary, context) without walls of
      text; bold marks labels, not inline emphasis.
    howToCheck: >-
      Judge whether context/summary read as real explanation and whether bold is
      overused for emphasis.
