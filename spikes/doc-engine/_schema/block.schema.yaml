# Meta-schema — every blocks/*.yaml must conform. Run: python3 check_schema.py
# This is the schema the block schemas follow, so definitions stay structured too.
fields:
  type:        { kind: string,   required: true }
  description: { kind: string,   required: true }
  rubric:      { kind: strmap,   required: true }
  body:        { kind: typespec, required: false }
  attrs:       { kind: attrs,    required: false }
  collection:  { kind: bool,     required: false }
  group:       { kind: string,   required: false }
# Semantic rule (enforced in check_schema.py): a collection block must declare `group`.
