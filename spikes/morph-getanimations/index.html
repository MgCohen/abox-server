<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Morph spike — getAnimations completion</title>
<!--
  Proves `getAnimations({subtree:true}).finished` as the completion mechanism,
  PURE HTML/CSS (no <script>). The Playwright harness (probe-getanimations.mjs)
  defines the exact production `waitForAnimations` helper and drives three cases:
    #gap     staggered with an IDLE GAP (delay 600ms > duration 200ms) — the case
             where animationstart/animationend counting false-completes early.
    #long    a long animation interrupted mid-flight — .finished must reject AbortError.
    #static  no animation at all — getAnimations() empty → must resolve instantly.
-->
<style>
  body { margin: 0; padding: 32px; font-family: "Segoe UI", system-ui, sans-serif; background: #e7ddcd; color: #4d4434; }
  h1 { font-size: 17px; } .sub { color: #9a8f78; font-size: 13px; margin-bottom: 22px; }
  .stage { margin: 14px 0; }
  .box { display: inline-block; width: 120px; padding: 14px; margin: 6px; border-radius: 12px;
         background: #ece3d5; box-shadow: 4px 4px 10px rgba(166,143,108,.6), -4px -4px 10px rgba(255,255,255,.9); }

  @keyframes fade { from { opacity: .15; } to { opacity: 1; } }

  /* #gap — A finishes at 200ms; B does not even START until 600ms (it sits in its
     animation-delay). started==ended is briefly true at 200ms → counting lies. */
  .stage[data-phase="enter"] .gap-a { animation: fade 200ms linear both; }
  .stage[data-phase="enter"] .gap-b { animation: fade 200ms linear 600ms both; }

  /* #long — one long animation; the harness cancels it mid-flight. */
  .stage[data-phase="enter"] .long { animation: fade 800ms linear both; }

  /* #static has no animation rule — getAnimations({subtree:true}) returns []. */
</style>
</head>
<body>
  <h1>Morph spike · getAnimations completion</h1>
  <p class="sub">Gapped stagger, interruption, and a static phase — the three cases that decide the mechanism.</p>

  <div id="gap" class="stage" data-phase="">
    <div class="box gap-a">A · 0–200ms</div>
    <div class="box gap-b">B · 600–800ms</div>
  </div>

  <div id="long" class="stage" data-phase="">
    <div class="box long">long · 800ms</div>
  </div>

  <div id="static" class="stage" data-phase="">
    <div class="box">static · no animation</div>
  </div>
</body>
</html>
