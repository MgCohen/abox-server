type: procedure
collection: true
group: Procedures
composes: [step]
description: One self-contained how-to within a guide — context, ordered steps, and a stated outcome a reader can recognize.
rubric:
  title-gerund: The title names the activity as a gerund phrase ("Adding a hook"), not an imperative ("Add a hook").
  outcome-prose: Outcome is one to three lines of prose a human or agent can act on — what you end with and how you'd know it worked; it may name a command to run, not a bare file path.
  steps-present: Has at least one step.
labels:
  Context:
    required: true
  Outcome:
    required: true
body:
  type: markdown
