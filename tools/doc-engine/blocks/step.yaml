type: step
description: One ordered instruction within a procedure — the heading reads "N. <imperative>", its leading ordinal is the enforced id, with an optional Condition and details.
rubric:
  imperative: A single concrete instruction the reader can act on, not a paragraph of context.
  id-grammar: The id reads N, then N.M for a sub-step or N.a for a branch.
attrs:
  id:
    type: string
    pattern: '^\d+(\.\d+)*(\.[a-z])?$'
    inHeading: true
    required: true
labels:
  Condition:
    required: false
body:
  type: markdown
  required: false
