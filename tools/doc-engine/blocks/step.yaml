type: step
description: One ordered instruction within an action — the name is the heading, the id is an enforced invisible handle, condition and details are optional.
rubric:
  imperative: A single concrete instruction the reader can act on, not a paragraph of context.
  id-grammar: The id reads N, then N.M for a sub-step or N.a for a branch.
attrs:
  id:
    type: string
    pattern: '^\d+(\.\d+)*(\.[a-z])?$'
    hidden: true
    required: true
  condition:
    type: string
body:
  type: markdown
  required: false
