docType: rulebook
description: A test type's Rulebook — navigation links then a list of Rules, each a guarantee proven by tests.
blocks: [links, rule]
required: [links, rule]
attrs:
  testType:
    enum: [arch, structure, unit, e2e, wire, live, meta]
    required: true
rubric:
  coverage: Every guarantee of this type has a Rule; nothing significant unstated.
  right-type: Each Rule matches the declared testType — behaviour (with Outcome) for wire/live/e2e, invariant for arch/structure/meta.
  one-per-rule: Each Rule states exactly one guarantee, not a bundle or a restatement.
