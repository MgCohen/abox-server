name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build ABox.slnx -c Release
      - run: dotnet test ABox.slnx -c Release --no-build

  policy-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            base=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          git diff --name-only "$base" "${{ github.sha }}" > changed.txt || true
          echo "Changed files:"; cat changed.txt
      - name: Enforce protected-path policy
        run: |
          if [ -s changed.txt ]; then
            xargs -a changed.txt -r governance/protected-paths-check.sh
          fi
