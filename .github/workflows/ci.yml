name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build ABox.slnx -c Release
      - run: dotnet test ABox.slnx -c Release --no-build

  policy-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            base=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          git diff --name-only "$base" "${{ github.sha }}" > changed.txt || true
          echo "Changed files:"; cat changed.txt
      - name: Flag protected-path changes (advisory)
        run: |
          if [ ! -s changed.txt ]; then
            echo "No files changed."; exit 0
          fi
          if out=$(xargs -a changed.txt -r governance/protected-paths-check.sh 2>&1); then
            echo "No protected paths changed."; exit 0
          fi
          echo "$out"
          printf '%s\n' "$out" | grep '^  - ' | while IFS= read -r line; do
            echo "::warning::Protected path changed — code-owner review required:${line#  - }"
          done || true
          echo "::notice::This PR changes protected paths; merging requires code-owner review (CODEOWNERS). This check is advisory and does not block."
          exit 0
      - name: Label critical-path PRs (reconcile)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          hits=
          if [ -s changed.txt ]; then
            hits=$(xargs -a changed.txt -r governance/protected-paths-check.sh --tier critical || true)
          fi
          if [ -n "$hits" ]; then
            echo "Critical paths changed — labelling PR #$PR 'critical-path'."
            gh pr edit "$PR" --repo "${{ github.repository }}" --add-label "critical-path" || echo "label add failed (non-blocking)"
          else
            echo "No critical paths — ensuring 'critical-path' label is absent."
            gh pr edit "$PR" --repo "${{ github.repository }}" --remove-label "critical-path" || true
          fi
      - name: Alert on critical-path changes (non-blocking)
        if: always()
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          [ -s changed.txt ] || { echo "No files changed."; exit 0; }
          hits=$(xargs -a changed.txt -r governance/protected-paths-check.sh --tier critical || true)
          if [ -z "$hits" ]; then echo "No critical-path changes."; exit 0; fi
          echo "Critical-path changes detected:"; printf '%s\n' "$hits" | sed 's/^/  - /'
          if [ -z "${NTFY_TOPIC:-}" ]; then
            echo "::warning::Critical path changed but no alert channel configured (set the NTFY_TOPIC secret; see governance/notify.yml)."
            exit 0
          fi
          pipx install apprise >/dev/null 2>&1 || python3 -m pip install --quiet apprise || { echo "apprise unavailable (non-blocking)"; exit 0; }
          xargs -a changed.txt -r governance/notify-critical.sh || echo "notify step failed (non-blocking)"
          exit 0
